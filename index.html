        {"q": "A client admitted with a right femur fracture is placed in balanced suspension traction. During the first 48 hours, the nurse should assess the client for which complication?", "opts": ["A. Deep vein thrombosis", "B. Muscle atrophy", "C. Fat embolism", "D. Compartment syndrome"], "correct": [2], "rationale": "Fat embolism syndrome or FES is a serious complication that occurs within 24 to 72 hours of long-bone fractures. Fat globules from the bone marrow enter the circulation and can cause respiratory failure, petechiae, and neurological changes.", "chapter": 2, "chapName": "Exam 2 - Shock, Ventilation and Critical Care", "displayNumber": 23, "theme": {"dark": "#1a0a3d", "mid": "#4c1d95", "accent": "#a78bfa", "bg": "#f5f3ff", "border": "#c4b5fd", "hover": "#ede9fe", "nav": "#ddd6fe", "rat_bg": "#ede9fe", "rat_border": "#7c3aed", "text": "#1e0a44"}},
        {"q": "A nurse is planning to admit a patient on mechanical ventilation from the emergency department. What action by the nurse takes priority?", "opts": ["A. Review the patient's current ventilator settings", "B. Prepare the patient's room with suction equipment", "C. Ensure a bag-valve mask is in the room", "D. Confirm IV access and medication orders"], "correct": [2], "rationale": "A bag-valve mask or Ambu bag must be immediately available before the ventilated patient arrives. If the ventilator malfunctions during transport or transfer, manual ventilation with the BVM is the only backup and is a critical safety requirement.", "chapter": 2, "chapName": "Exam 2 - Shock, Ventilation and Critical Care", "displayNumber": 24, "theme": {"dark": "#1a0a3d", "mid": "#4c1d95", "accent": "#a78bfa", "bg": "#f5f3ff", "border": "#c4b5fd", "hover": "#ede9fe", "nav": "#ddd6fe", "rat_bg": "#ede9fe", "rat_border": "#7c3aed", "text": "#1e0a44"}},
        {"q": "A nurse is caring for a client after surgery who is restless and apprehensive. The AP reports slightly changed vital signs. What action does the nurse delegate next to the AP?", "opts": ["A. Assess the patient's neurological status", "B. Prepare to administer pain medication", "C. Measure urine output", "D. Take another set of vital signs in 15 minutes"], "correct": [2], "rationale": "Decreased urine output is an early sensitive indicator of hemodynamic compromise. Measuring urine output in the post-operative restless patient helps determine if the changes reflect developing hypovolemia or poor perfusion.", "chapter": 2, "chapName": "Exam 2 - Shock, Ventilation and Critical Care", "displayNumber": 25, "theme": {"dark": "#1a0a3d", "mid": "#4c1d95", "accent": "#a78bfa", "bg": "#f5f3ff", "border": "#c4b5fd", "hover": "#ede9fe", "nav": "#ddd6fe", "rat_bg": "#ede9fe", "rat_border": "#7c3aed", "text": "#1e0a44"}},
        {"q": "A client has a closed fracture with a new cast on the affected arm and complains of intense pain despite elevation, ice, and analgesia. What problem may be causing the pain?", "opts": ["A. Infection developing under the cast", "B. Inadequate analgesic dosing", "C. Impaired tissue perfusion", "D. Normal post-fracture pain response"], "correct": [2], "rationale": "Intense pain unrelieved by standard measures after casting is the cardinal sign of compartment syndrome, a surgical emergency. Increased pressure in a fascial compartment impairs tissue perfusion causing ischemia and requiring immediate fasciotomy.", "chapter": 2, "chapName": "Exam 2 - Shock, Ventilation and Critical Care", "displayNumber": 26, "theme": {"dark": "#1a0a3d", "mid": "#4c1d95", "accent": "#a78bfa", "bg": "#f5f3ff", "border": "#c4b5fd", "hover": "#ede9fe", "nav": "#ddd6fe", "rat_bg": "#ede9fe", "rat_border": "#7c3aed", "text": "#1e0a44"}},
        {"q": "A nurse is assisting a healthcare provider who has been attempting to intubate a patient for 40 seconds. What action by the nurse takes priority?", "opts": ["A. Prepare for a surgical airway", "B. Hand the provider the next-size smaller tube", "C. Interrupt the procedure to give oxygen", "D. Document the number of intubation attempts"], "correct": [2], "rationale": "Prolonged intubation attempts cause desaturation. The standard recommendation is to limit attempts to 30 seconds and provide oxygenation between attempts. After 40 seconds the nurse must interrupt to ventilate the patient with a BVM.", "chapter": 2, "chapName": "Exam 2 - Shock, Ventilation and Critical Care", "displayNumber": 27, "theme": {"dark": "#1a0a3d", "mid": "#4c1d95", "accent": "#a78bfa", "bg": "#f5f3ff", "border": "#c4b5fd", "hover": "#ede9fe", "nav": "#ddd6fe", "rat_bg": "#ede9fe", "rat_border": "#7c3aed", "text": "#1e0a44"}},
        {"q": "A nurse assesses a patient with a tracheostomy and notes that the tracheostomy tube is pulsing with each heartbeat. What action by the nurse is most appropriate?", "opts": ["A. Document the finding and monitor closely", "B. Deflate the cuff and reposition the tube", "C. Stay with the client and have someone else call the provider immediately", "D. Suction the airway to rule out secretion buildup"], "correct": [2], "rationale": "A pulsating tracheostomy tube may indicate erosion into a major vessel known as tracheoinnominate fistula, a life-threatening emergency with risk of massive hemorrhage. The nurse must not leave the patient and must immediately summon help.", "chapter": 2, "chapName": "Exam 2 - Shock, Ventilation and Critical Care", "displayNumber": 28, "theme": {"dark": "#1a0a3d", "mid": "#4c1d95", "accent": "#a78bfa", "bg": "#f5f3ff", "border": "#c4b5fd", "hover": "#ede9fe", "nav": "#ddd6fe", "rat_bg": "#ede9fe", "rat_border": "#7c3aed", "text": "#1e0a44"}},
        {"q": "A patient is receiving norepinephrine or Levophed for shock. What assessment finding best indicates a therapeutic effect?", "opts": ["A. Blood pressure 90/60 mmHg", "B. Urine output 15 mL/hr", "C. Alert and oriented, answering questions", "D. Heart rate 120 bpm"], "correct": [2], "rationale": "The goal of vasopressor therapy is to restore tissue perfusion. A patient who is alert and oriented demonstrates adequate cerebral perfusion, which is the best indicator of therapeutic effectiveness. Mental status reflects global organ perfusion.", "chapter": 2, "chapName": "Exam 2 - Shock, Ventilation and Critical Care", "displayNumber": 29, "theme": {"dark": "#1a0a3d", "mid": "#4c1d95", "accent": "#a78bfa", "bg": "#f5f3ff", "border": "#c4b5fd", "hover": "#ede9fe", "nav": "#ddd6fe", "rat_bg": "#ede9fe", "rat_border": "#7c3aed", "text": "#1e0a44"}},
        {"q": "A patient in shock has started on dopamine. What assessment finding requires the nurse to communicate with the provider immediately?", "opts": ["A. Blood pressure rising to 110/70 mmHg", "B. Heart rate decreasing from 120 to 90 bpm", "C. Report of chest heaviness", "D. Urine output increasing to 45 mL/hr"], "correct": [2], "rationale": "Dopamine at higher doses increases myocardial oxygen demand and can cause chest pain indicating myocardial ischemia or dysrhythmia. Chest heaviness during vasopressor therapy is an urgent finding requiring immediate provider notification.", "chapter": 2, "chapName": "Exam 2 - Shock, Ventilation and Critical Care", "displayNumber": 30, "theme": {"dark": "#1a0a3d", "mid": "#4c1d95", "accent": "#a78bfa", "bg": "#f5f3ff", "border": "#c4b5fd", "hover": "#ede9fe", "nav": "#ddd6fe", "rat_bg": "#ede9fe", "rat_border": "#7c3aed", "text": "#1e0a44"}},
        {"q": "A trauma nurse cares for several patients with fractures. Which patient would the nurse identify as at highest risk for deep vein thrombosis or DVT?", "opts": ["A. A 22-year-old female with a fractured wrist", "B. A 40-year-old male with an isolated rib fracture", "C. A 74-year-old who smokes and has a fractured pelvis", "D. A 55-year-old who is ambulatory with a fractured fibula"], "correct": [2], "rationale": "DVT risk is highest with advanced age, smoking causing hypercoagulability, immobility, and pelvic fracture due to proximity to large vessels. The 74-year-old smoker with a pelvic fracture has multiple high-risk factors combined.", "chapter": 2, "chapName": "Exam 2 - Shock, Ventilation and Critical Care", "displayNumber": 31, "theme": {"dark": "#1a0a3d", "mid": "#4c1d95", "accent": "#a78bfa", "bg": "#f5f3ff", "border": "#c4b5fd", "hover": "#ede9fe", "nav": "#ddd6fe", "rat_bg": "#ede9fe", "rat_border": "#7c3aed", "text": "#1e0a44"}},
        {"q": "A patient is in shock and the nurse prepares to administer insulin for blood glucose of 208 mg/dL. The spouse asks why insulin is needed since the patient is not diabetic. What response by the nurse is best?", "opts": ["A. The stress medications we are giving cause elevated blood sugar.", "B. High glucose is common in shock and needs to be treated to prevent complications.", "C. The IV fluids we are giving contain sugar, causing this elevation.", "D. This is a temporary side effect of the antibiotics."], "correct": [1], "rationale": "Stress hyperglycemia occurs in critically ill patients regardless of diabetic history. Cortisol and catecholamines released during shock increase gluconeogenesis and cause insulin resistance. Maintaining euglycemia improves outcomes in critically ill patients.", "chapter": 2, "chapName": "Exam 2 - Shock, Ventilation and Critical Care", "displayNumber": 32, "theme": {"dark": "#1a0a3d", "mid": "#4c1d95", "accent": "#a78bfa", "bg": "#f5f3ff", "border": "#c4b5fd", "hover": "#ede9fe", "nav": "#ddd6fe", "rat_bg": "#ede9fe", "rat_border": "#7c3aed", "text": "#1e0a44"}},
        {"q": "An unlicensed assistive personnel was feeding a patient with a tracheostomy and reports the patient had a coughing spell during the meal. What action by the nurse takes priority?", "opts": ["A. Reassure the patient and offer water", "B. Document the coughing episode", "C. Make the patient NPO immediately", "D. Assess the patient's lung sounds"], "correct": [3], "rationale": "A coughing spell during eating in a tracheostomy patient suggests aspiration. Assessing lung sounds allows the nurse to detect crackles, wheezes, or reduced breath sounds indicating aspiration of food or liquid into the airways.", "chapter": 2, "chapName": "Exam 2 - Shock, Ventilation and Critical Care", "displayNumber": 33, "theme": {"dark": "#1a0a3d", "mid": "#4c1d95", "accent": "#a78bfa", "bg": "#f5f3ff", "border": "#c4b5fd", "hover": "#ede9fe", "nav": "#ddd6fe", "rat_bg": "#ede9fe", "rat_border": "#7c3aed", "text": "#1e0a44"}},
        {"q": "What occurs during the refractory stage of shock?", "opts": ["A. The body compensates by increasing heart rate and vasoconstriction", "B. Organ dysfunction begins but is still reversible with treatment", "C. Bleeding and oozing from IV sites and multisystem organ failure that is irreversible", "D. Cellular hypoxia leads to anaerobic metabolism and lactic acidosis"], "correct": [2], "rationale": "The refractory or irreversible stage of shock is characterized by irreversible cellular and organ damage. Clotting factors are depleted causing bleeding from IV sites indicating DIC, and multisystem organ failure progresses despite all interventions.", "chapter": 2, "chapName": "Exam 2 - Shock, Ventilation and Critical Care", "displayNumber": 34, "theme": {"dark": "#1a0a3d", "mid": "#4c1d95", "accent": "#a78bfa", "bg": "#f5f3ff", "border": "#c4b5fd", "hover": "#ede9fe", "nav": "#ddd6fe", "rat_bg": "#ede9fe", "rat_border": "#7c3aed", "text": "#1e0a44"}},
        {"q": "The nurse is preparing to change a patient's sternal dressing. What action by the nurse is most important?", "opts": ["A. Don sterile gloves", "B. Open sterile supplies on a sterile field", "C. Perform hand hygiene", "D. Apply a mask and eye protection"], "correct": [2], "rationale": "Hand hygiene is the single most important action in preventing healthcare-associated infections. It must be performed before any patient care procedure including dressing changes, regardless of other protective measures used.", "chapter": 2, "chapName": "Exam 2 - Shock, Ventilation and Critical Care", "displayNumber": 35, "theme": {"dark": "#1a0a3d", "mid": "#4c1d95", "accent": "#a78bfa", "bg": "#f5f3ff", "border": "#c4b5fd", "hover": "#ede9fe", "nav": "#ddd6fe", "rat_bg": "#ede9fe", "rat_border": "#7c3aed", "text": "#1e0a44"}},
        {"q": "A nurse is caring for a client with acute respiratory failure on mechanical ventilation. The nurse should monitor for which manifestations? (Select all that apply)", "opts": ["A. Severe dyspnea", "B. Decreased level of consciousness", "C. Headache", "D. Hypotension", "E. Polycythemia"], "correct": [0, 1, 2, 3], "rationale": "ARF manifestations include severe dyspnea reflecting increased work of breathing, decreased LOC from hypoxia or hypercapnia, headache from cerebral vasodilation caused by hypercapnia, and hypotension from impaired cardiac function. These reflect systemic effects of impaired gas exchange.", "chapter": 2, "chapName": "Exam 2 - Shock, Ventilation and Critical Care", "displayNumber": 36, "theme": {"dark": "#1a0a3d", "mid": "#4c1d95", "accent": "#a78bfa", "bg": "#f5f3ff", "border": "#c4b5fd", "hover": "#ede9fe", "nav": "#ddd6fe", "rat_bg": "#ede9fe", "rat_border": "#7c3aed", "text": "#1e0a44"}},
        {"q": "A patient has been diagnosed with tuberculosis or TB. What action by the nurse takes the highest priority?", "opts": ["A. Place the patient in airborne isolation", "B. Collect sputum samples for culture", "C. Educating the client on adherence to the treatment regimen", "D. Administer the first dose of anti-TB medications"], "correct": [2], "rationale": "While isolation is critical, the highest priority in TB management is adherence to the multi-drug regimen lasting 6 to 9 months. Non-adherence leads to drug resistance including MDR-TB and XDR-TB, which is a public health catastrophe. Education enables self-management and prevents resistance.", "chapter": 2, "chapName": "Exam 2 - Shock, Ventilation and Critical Care", "displayNumber": 37, "theme": {"dark": "#1a0a3d", "mid": "#4c1d95", "accent": "#a78bfa", "bg": "#f5f3ff", "border": "#c4b5fd", "hover": "#ede9fe", "nav": "#ddd6fe", "rat_bg": "#ede9fe", "rat_border": "#7c3aed", "text": "#1e0a44"}},
        {"q": "A nurse is caring for several patients at risk for shock. Which laboratory value requires the nurse to communicate with the healthcare provider?", "opts": ["A. Serum creatinine: 1.2 mg/dL", "B. White blood cell count: 11,000 per mm3", "C. Lactate: 6 mmol/L", "D. Hemoglobin: 10.5 g/dL"], "correct": [2], "rationale": "Lactate 6 mmol/L is significantly elevated above the normal of less than 2 mmol/L, indicating lactic acidosis from anaerobic metabolism and a sign of severe tissue hypoperfusion and shock. Elevated lactate is a mortality predictor and requires immediate provider notification.", "chapter": 2, "chapName": "Exam 2 - Shock, Ventilation and Critical Care", "displayNumber": 38, "theme": {"dark": "#1a0a3d", "mid": "#4c1d95", "accent": "#a78bfa", "bg": "#f5f3ff", "border": "#c4b5fd", "hover": "#ede9fe", "nav": "#ddd6fe", "rat_bg": "#ede9fe", "rat_border": "#7c3aed", "text": "#1e0a44"}},
        {"q": "A nurse on a general medical-surgical unit is caring for a client in shock with: RR 10, HR 136, BP 92/78 mmHg, LOC responds to voice, temp 101.5 F, and urine output 40 mL over 2 hours. What action by the nurse is best?", "opts": ["A. Administer a 500 mL normal saline bolus", "B. Increase vasopressor infusion rate", "C. Call the rapid response team", "D. Prepare for immediate intubation"], "correct": [2], "rationale": "This patient has signs of decompensating shock. On a med-surg unit, activating the rapid response team brings critical care expertise to bedside for immediate stabilization. This is the most appropriate and safe action in this setting.", "chapter": 2, "chapName": "Exam 2 - Shock, Ventilation and Critical Care", "displayNumber": 39, "theme": {"dark": "#1a0a3d", "mid": "#4c1d95", "accent": "#a78bfa", "bg": "#f5f3ff", "border": "#c4b5fd", "hover": "#ede9fe", "nav": "#ddd6fe", "rat_bg": "#ede9fe", "rat_border": "#7c3aed", "text": "#1e0a44"}},
        {"q": "A patient in the ED has esophageal trauma. The nurse palpates subcutaneous emphysema in the mediastinal area and lower neck. What action by the nurse takes priority?", "opts": ["A. Prepare for emergent chest tube insertion", "B. Administer high-flow oxygen via non-rebreather mask", "C. Assess the client's oxygenation status", "D. Obtain IV access and prepare for fluid resuscitation"], "correct": [2], "rationale": "Subcutaneous emphysema from esophageal trauma may indicate mediastinitis or pneumomediastinum, threatening the airway and breathing. Oxygenation assessment including SpO2, respiratory effort, and breath sounds establishes baseline and guides urgency of intervention.", "chapter": 2, "chapName": "Exam 2 - Shock, Ventilation and Critical Care", "displayNumber": 40, "theme": {"dark": "#1a0a3d", "mid": "#4c1d95", "accent": "#a78bfa", "bg": "#f5f3ff", "border": "#c4b5fd", "hover": "#ede9fe", "nav": "#ddd6fe", "rat_bg": "#ede9fe", "rat_border": "#7c3aed", "text": "#1e0a44"}},
        {"q": "A nurse is caring for a patient in skeletal traction. The nurse notes swollen, red, crusty skin with dried drainage around the pin site. Which action would the nurse take first?", "opts": ["A. Clean the pin site with hydrogen peroxide", "B. Apply topical antibiotic ointment to the site", "C. Notify the provider of the findings", "D. Obtain a prescription to culture the drainage"], "correct": [3], "rationale": "Signs of pin site infection including redness, swelling, and drainage require a culture to identify the pathogen before treatment. This ensures targeted antibiotic therapy rather than empirical treatment, reducing the risk of antibiotic resistance.", "chapter": 2, "chapName": "Exam 2 - Shock, Ventilation and Critical Care", "displayNumber": 41, "theme": {"dark": "#1a0a3d", "mid": "#4c1d95", "accent": "#a78bfa", "bg": "#f5f3ff", "border": "#c4b5fd", "hover": "#ede9fe", "nav": "#ddd6fe", "rat_bg": "#ede9fe", "rat_border": "#7c3aed", "text": "#1e0a44"}},
        {"q": "The nurse caring for older adults knows they are at higher risk for shock. For what factors would the nurse assess? (Select all that apply)", "opts": ["A. Altered mobility or immobility", "B. Decreased thirst response", "C. Diminished immune response", "D. Malnutrition", "E. Enhanced cardiac reserve"], "correct": [0, 1, 2, 3], "rationale": "Older adults are at increased risk for shock due to immobility causing DVT, pressure injury, and deconditioning; blunted thirst causing dehydration risk; diminished immune response causing sepsis risk; and malnutrition causing impaired healing and reduced physiological reserve.", "chapter": 2, "chapName": "Exam 2 - Shock, Ventilation and Critical Care", "displayNumber": 42, "theme": {"dark": "#1a0a3d", "mid": "#4c1d95", "accent": "#a78bfa", "bg": "#f5f3ff", "border": "#c4b5fd", "hover": "#ede9fe", "nav": "#ddd6fe", "rat_bg": "#ede9fe", "rat_border": "#7c3aed", "text": "#1e0a44"}},
        {"q": "A nurse is caring for five patients. For which patients would the nurse assess a high risk for developing pulmonary embolism or PE? (Select all that apply)", "opts": ["A. Client with a new spinal cord injury on a rotating bed", "B. Older client who is 1-day post hip replacement surgery", "C. Young obese client with a fractured femur", "D. A 25-year-old athlete post-appendectomy who is ambulatory", "E. A client with well-controlled hypertension"], "correct": [0, 1, 2], "rationale": "PE risk factors include venous stasis from spinal cord injury and immobility, hypercoagulability from surgery, and endothelial injury. The spinal cord injury, recent hip replacement, and fractured femur all significantly increase PE risk.", "chapter": 2, "chapName": "Exam 2 - Shock, Ventilation and Critical Care", "displayNumber": 43, "theme": {"dark": "#1a0a3d", "mid": "#4c1d95", "accent": "#a78bfa", "bg": "#f5f3ff", "border": "#c4b5fd", "hover": "#ede9fe", "nav": "#ddd6fe", "rat_bg": "#ede9fe", "rat_border": "#7c3aed", "text": "#1e0a44"}},

    // ── Theme engine ──────────────────────────────────────────────────────────
    function applyTheme(t) {
        var r = document.documentElement;
        r.style.setProperty('--dark',       t.dark);
        r.style.setProperty('--mid',        t.mid);
        r.style.setProperty('--accent',     t.accent);
        r.style.setProperty('--bg',         t.bg);
        r.style.setProperty('--border',     t.border);
        r.style.setProperty('--hover',      t.hover);
        r.style.setProperty('--nav',        t.nav);
        r.style.setProperty('--rat-bg',     t.rat_bg);
        r.style.setProperty('--rat-border', t.rat_border);
        r.style.setProperty('--text',       t.text);
        document.body.style.background = 'linear-gradient(145deg,' + t.dark + ',' + t.mid + ')';
    }

    // ── Chapter index ─────────────────────────────────────────────────────────
    var chapterIndex = {};
    questions.forEach(function(q, idx) {
        if (!chapterIndex[q.chapter]) {
            chapterIndex[q.chapter] = { name: q.chapName, firstIdx: idx, count: 0, theme: q.theme };
        }
        chapterIndex[q.chapter].count++;
    });

    // Build ordered chapter list directly — avoids Object.keys() ordering issues
    var chapterList = [];
    var seenCh = {};
    questions.forEach(function(q, idx) {
        if (!seenCh[q.chapter]) {
            seenCh[q.chapter] = true;
            chapterList.push({ ch: q.chapter, name: q.chapName, firstIdx: idx, count: chapterIndex[q.chapter].count });
        }
    });

    // ── Helpers ───────────────────────────────────────────────────────────────
    function isMultiSelect(q) {
        return q.correct.length > 1;
    }

    function updateSelectedCount() {
        var el = document.getElementById('selectedCount');
        if (isMultiSelect(questions[currentQuestion]) && !answered) {
            el.textContent = selectedOptions.length > 0
                ? 'Selected: ' + selectedOptions.length + ' of ' + questions[currentQuestion].correct.length + ' required'
                : 'Select all that apply';
        } else {
            el.textContent = '';
        }
    }

    function selectOption(idx) {
        if (answered) return;
        var q = questions[currentQuestion];
        var isMulti = isMultiSelect(q);
        var opts = document.querySelectorAll('.option');

        if (isMulti) {
            var pos = selectedOptions.indexOf(idx);
            if (pos === -1) {
                selectedOptions.push(idx);
                opts[idx].classList.add('selected');
            } else {
                selectedOptions.splice(pos, 1);
                opts[idx].classList.remove('selected');
            }
            document.getElementById('cancelBtn').classList.toggle('show', selectedOptions.length > 0);
            document.getElementById('nextBtn').disabled = selectedOptions.length === 0;
            updateSelectedCount();
            if (selectedOptions.length === q.correct.length) submitAnswer();
        } else {
            selectedOptions = [idx];
            opts.forEach(function(o) { o.classList.remove('selected'); });
            opts[idx].classList.add('selected');
            document.getElementById('cancelBtn').classList.add('show');
            document.getElementById('nextBtn').disabled = false;
            submitAnswer();
        }
    }

    function submitAnswer() {
        answered = true;
        var q = questions[currentQuestion];
        var opts = document.querySelectorAll('.option');
        var correct = q.correct.slice().sort().join(',');
        var given   = selectedOptions.slice().sort().join(',');
        var isCorrect = correct === given;

        opts.forEach(function(opt, i) {
            if (q.correct.includes(i)) opt.classList.add('correct');
            else if (selectedOptions.includes(i)) opt.classList.add('incorrect');
        });

        var tag = document.getElementById('resultTag');
        tag.textContent  = isCorrect ? '✓ Correct' : '✗ Incorrect';
        tag.className    = 'result-tag ' + (isCorrect ? 'correct' : 'incorrect');

        document.getElementById('rationaleText').textContent = q.rationale;
        document.getElementById('rationale').classList.add('show');
        document.getElementById('cancelBtn').classList.remove('show');
        document.getElementById('nextBtn').disabled = false;
    }

    function cancelSelection() {
        selectedOptions = [];
        var opts = document.querySelectorAll('.option');
        opts.forEach(function(o) { o.classList.remove('selected','correct','incorrect'); });
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('resultTag').innerHTML = '';
        document.getElementById('resultTag').className = 'result-tag';
        document.getElementById('cancelBtn').classList.remove('show');
        document.getElementById('nextBtn').disabled = true;
        answered = false;
        updateSelectedCount();
    }

    function loadQuestion() {
        var q = questions[currentQuestion];
        if (!q) return;
        if (q.theme) applyTheme(q.theme);

        selectedOptions = [];
        answered = false;

        document.getElementById('chapterName').textContent = 'Chapter ' + q.chapter + ': ' + q.chapName;
        document.getElementById('qTypeBadge').textContent = isMultiSelect(q) ? 'Multiple' : 'Single';
        document.getElementById('questionNumber').textContent = q.displayNumber;
        document.getElementById('question').textContent = q.q;
        document.getElementById('counter').textContent = (currentQuestion + 1) + '/' + questions.length;
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('resultTag').innerHTML = '';
        document.getElementById('resultTag').className = 'result-tag';
        document.getElementById('cancelBtn').classList.remove('show');
        document.getElementById('nextBtn').disabled = true;
        document.getElementById('prevBtn').disabled = currentQuestion === 0;

        var pct = ((currentQuestion + 1) / questions.length * 100).toFixed(1);
        document.getElementById('progressBar').style.width = pct + '%';

        var container = document.getElementById('options');
        container.innerHTML = '';
        q.opts.forEach(function(opt, i) {
            var div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = '<div class="option-letter">' + String.fromCharCode(65 + i) + '</div><div>' + opt + '</div>';
            div.onclick = (function(idx) { return function() { selectOption(idx); }; })(i);
            container.appendChild(div);
        });

        updateSelectedCount();
    }

    function skipQuestion() {
        // Mark as skipped and move forward without revealing answer
        cancelSelection();
        nextCard();
    }

    function nextCard() {
        if (currentQuestion < questions.length - 1) { currentQuestion++; loadQuestion(); }
        else { currentQuestion = 0; loadQuestion(); }
    }

    function previousCard() {
        if (currentQuestion > 0) { currentQuestion--; loadQuestion(); }
    }

    function randomCard() {
        var idx;
        do { idx = Math.floor(Math.random() * questions.length); }
        while (idx === currentQuestion && questions.length > 1);
        currentQuestion = idx;
        loadQuestion();
    }

    // ── Chapter modal ─────────────────────────────────────────────────────────
    function buildChapterGrid() {
        var grid = document.getElementById('chapterGrid');
        grid.innerHTML = '';
        var currentCh = questions[currentQuestion].chapter;
        chapterList.forEach(function(item) {
            var ch   = item.ch;
            var card = document.createElement('div');
            card.className = 'ch-card' + (ch === currentCh ? ' active' : '');
            card.id = 'ch-card-' + ch;
            card.setAttribute('data-name', ('chapter ' + ch + ' ' + item.name).toLowerCase());
            card.innerHTML =
                '<div class="ch-num">' + ch + '</div>' +
                '<div class="ch-info">' +
                '<div class="ch-title">Ch ' + ch + ': ' + item.name + '</div>' +
                '<div class="ch-count">' + item.count + ' questions</div>' +
                '</div>';
            card.onclick = (function(c) { return function() { jumpToChapter(c); }; })(ch);
            grid.appendChild(card);
        });
        // Scroll active card into view
        var active = document.getElementById('ch-card-' + currentCh);
        if (active) setTimeout(function(){ active.scrollIntoView({block:'nearest',behavior:'smooth'}); }, 50);
    }

    function jumpToChapter(ch) {
        currentQuestion = chapterIndex[ch].firstIdx;
        loadQuestion();
        closeChapterModal();
    }

    function openChapterModal() {
        buildChapterGrid();
        document.getElementById('chSearch').value = '';
        document.getElementById('chapterModal').classList.add('open');
    }

    function closeChapterModal() {
        document.getElementById('chapterModal').classList.remove('open');
    }

    function filterChapters(query) {
        var q = query.toLowerCase().trim();
        document.querySelectorAll('.ch-card').forEach(function(card) {
            card.classList.toggle('hidden', q !== '' && !card.getAttribute('data-name').includes(q));
        });
    }

    // Close modal on overlay click
    document.getElementById('chapterModal').addEventListener('click', function(e) {
        if (e.target === this) closeChapterModal();
    });

    // ── Keyboard shortcuts ────────────────────────────────────────────────────
    document.addEventListener('keydown', function(e) {
        if (document.getElementById('chapterModal').classList.contains('open')) {
            if (e.key === 'Escape') closeChapterModal();
            return;
        }
        if (e.key >= '1' && e.key <= '6') {
            var idx = parseInt(e.key) - 1;
            if (idx < questions[currentQuestion].opts.length) selectOption(idx);
        } else if (e.key >= 'a' && e.key <= 'f') {
            selectOption(e.key.charCodeAt(0) - 97);
        } else if (e.key >= 'A' && e.key <= 'F') {
            selectOption(e.key.charCodeAt(0) - 65);
        } else if (e.key === 'ArrowLeft'  && !document.getElementById('prevBtn').disabled) previousCard();
          else if (e.key === 'ArrowRight' && !document.getElementById('nextBtn').disabled) nextCard();
          else if (e.key === 'Escape' && document.getElementById('cancelBtn').classList.contains('show')) cancelSelection();
          else if (e.key === 'r' || e.key === 'R') randomCard();
    });

    // ── Expose globals ────────────────────────────────────────────────────────
    window.previousCard      = previousCard;
    window.nextCard          = nextCard;
    window.skipQuestion      = skipQuestion;
    window.cancelSelection   = cancelSelection;
    window.randomCard        = randomCard;
    window.openChapterModal  = openChapterModal;
    window.closeChapterModal = closeChapterModal;
    window.filterChapters    = filterChapters;

    loadQuestion();

})();
</script>
